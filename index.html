<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Taskly – Professional Todo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  /* ── DESIGN TOKENS ─────────────────────────────────────────────── */
  :root {
    --bg:        #0F1117;
    --surface:   #1A1D27;
    --surface2:  #232638;
    --border:    #2E3247;
    --accent:    #6C63FF;
    --accent2:   #A78BFA;
    --success:   #22D3A5;
    --warn:      #F59E0B;
    --danger:    #F87171;
    --text:      #F0F0FA;
    --text2:     #8B8FA8;
    --text3:     #555870;
    --font:      'Inter', system-ui, sans-serif;
    --radius:    14px;
    --radius-sm: 8px;
    --shadow:    0 8px 32px rgba(0,0,0,.45);
    --transition: .22s cubic-bezier(.4,0,.2,1);
  }
  .light {
    --bg:       #F4F6FB;
    --surface:  #FFFFFF;
    --surface2: #EEF0FA;
    --border:   #D8DCF0;
    --text:     #1A1D27;
    --text2:    #555870;
    --text3:    #A0A4BE;
    --shadow:   0 8px 32px rgba(108,99,255,.10);
  }

  /* ── RESET & BASE ──────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
  input, textarea, select {
    font-family: inherit; color: var(--text);
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); outline: none;
    transition: border-color var(--transition);
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface); }

  /* ── LAYOUT ────────────────────────────────────────────────────── */
  #app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* ── HEADER ────────────────────────────────────────────────────── */
  header {
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .logo { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }
  .logo span { color: var(--accent); }
  .header-actions { display: flex; gap: 10px; }
  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    transition: background var(--transition), transform var(--transition);
  }
  .icon-btn:hover { background: var(--surface2); transform: scale(1.08); }

  /* ── NAV TABS ──────────────────────────────────────────────────── */
  .nav {
    display: flex;
    gap: 6px;
    padding: 16px 20px 0;
    flex-shrink: 0;
  }
  .nav-btn {
    flex: 1;
    padding: 9px 4px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    background: var(--surface);
    border: 1.5px solid var(--border);
    transition: all var(--transition);
    letter-spacing: .3px;
  }
  .nav-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 4px 16px rgba(108,99,255,.35);
  }

  /* ── MAIN SCROLL ───────────────────────────────────────────────── */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px 100px;
    scroll-behavior: smooth;
  }
  main::-webkit-scrollbar { width: 4px; }
  main::-webkit-scrollbar-track { background: transparent; }
  main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── SECTION HEADINGS ──────────────────────────────────────────── */
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 18px 0 10px;
  }
  .section-head h2 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }
  .badge {
    font-size: 11px;
    font-weight: 700;
    background: var(--accent);
    color: #fff;
    padding: 2px 8px;
    border-radius: 20px;
  }

  /* ── SUMMARY CARDS ─────────────────────────────────────────────── */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 6px;
  }
  .summary-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 10px;
    text-align: center;
    transition: transform var(--transition);
  }
  .summary-card:hover { transform: translateY(-2px); }
  .summary-card .num {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }
  .summary-card .lbl {
    font-size: 11px;
    color: var(--text2);
    font-weight: 500;
  }
  .c-accent { color: var(--accent); }
  .c-success { color: var(--success); }
  .c-warn { color: var(--warn); }

  /* ── PROGRESS BAR ──────────────────────────────────────────────── */
  .progress-bar-wrap {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .progress-bar-wrap .label-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .progress-track {
    height: 10px;
    background: var(--surface2);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .7s cubic-bezier(.4,0,.2,1);
  }

  /* ── CHARTS ────────────────────────────────────────────────────── */
  .chart-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
  }
  .chart-card h3 {
    font-size: 13px;
    font-weight: 700;
    color: var(--text2);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .chart-container { position: relative; height: 160px; }

  /* ── STREAKS & INSIGHTS ─────────────────────────────────────────── */
  .insight-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .insight-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .insight-icon {
    font-size: 26px;
    flex-shrink: 0;
  }
  .insight-text .val {
    font-size: 20px;
    font-weight: 800;
    line-height: 1;
  }
  .insight-text .desc {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
  }

  /* ── FILTER ROW ────────────────────────────────────────────────── */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text2);
    transition: all var(--transition);
  }
  .filter-chip.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* ── TASK CARD ─────────────────────────────────────────────────── */
  .task-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 14px 12px;
    margin-bottom: 10px;
    position: relative;
    transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
    cursor: pointer;
    overflow: hidden;
    touch-action: pan-y;
  }
  .task-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .task-card.completed { opacity: .55; }
  .task-card.completing {
    animation: completeTask .55s cubic-bezier(.4,0,.2,1) forwards;
  }
  .task-card.deleting {
    animation: slideOut .35s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes completeTask {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.03); }
    60%  { transform: scale(.97); }
    100% { transform: scale(1); }
  }
  @keyframes slideOut {
    to { transform: translateX(100%); opacity: 0; height: 0; margin: 0; padding: 0; }
  }
  .task-priority-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    border-radius: 14px 0 0 14px;
  }
  .task-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding-left: 8px;
  }
  /* Checkbox with morphing animation */
  .check-wrap {
    flex-shrink: 0;
    margin-top: 2px;
  }
  .check-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition);
    position: relative;
    overflow: hidden;
  }
  .check-btn.done {
    background: var(--success);
    border-color: var(--success);
    animation: checkPop .4s cubic-bezier(.4,0,.2,1);
  }
  @keyframes checkPop {
    0%   { transform: scale(0.6); }
    50%  { transform: scale(1.25); }
    100% { transform: scale(1); }
  }
  .check-btn svg { opacity: 0; transition: opacity .2s; }
  .check-btn.done svg { opacity: 1; }
  .task-body { flex: 1; min-width: 0; }
  .task-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 4px;
    word-break: break-word;
  }
  .task-title.struck { text-decoration: line-through; color: var(--text2); }
  .task-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
    align-items: center;
  }
  .tag {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1.5px solid;
    letter-spacing: .3px;
  }
  .task-date {
    font-size: 11px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .task-date.overdue { color: var(--danger); }
  .task-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    padding-left: 8px;
    justify-content: flex-end;
  }
  .task-action-btn {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text2);
    transition: all var(--transition);
  }
  .task-action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .task-action-btn.del:hover { border-color: var(--danger); color: var(--danger); }
  /* Sub-task progress */
  .subtask-progress {
    margin-top: 8px;
    padding-left: 8px;
  }
  .subtask-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 4px;
  }
  .subtask-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--accent), var(--success));
    transition: width .5s cubic-bezier(.4,0,.2,1);
  }
  .subtask-label { font-size: 10px; color: var(--text2); }

  /* ── EMPTY STATE ───────────────────────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text2);
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ── FAB ───────────────────────────────────────────────────────── */
  .fab {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 8px 24px rgba(108,99,255,.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    color: #fff;
    transition: transform var(--transition), box-shadow var(--transition);
    z-index: 100;
  }
  .fab:hover { transform: translateX(-50%) scale(1.1); box-shadow: 0 12px 32px rgba(108,99,255,.65); }
  .fab:active { transform: translateX(-50%) scale(.95); }

  /* ── MODAL OVERLAY ─────────────────────────────────────────────── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.65);
    z-index: 200;
    display: flex; align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition);
    backdrop-filter: blur(4px);
  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 20px 20px 40px;
    transform: translateY(100%);
    transition: transform .35s cubic-bezier(.4,0,.2,1);
    max-height: 92dvh;
    overflow-y: auto;
  }
  .overlay.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin: 0 auto 18px;
  }
  .modal h2 { font-size: 18px; font-weight: 800; margin-bottom: 18px; }

  /* ── FORM ELEMENTS ─────────────────────────────────────────────── */
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text2);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 11px 12px;
    font-size: 14px;
    border-radius: var(--radius-sm);
  }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Priority selector */
  .priority-row { display: flex; gap: 8px; }
  .priority-opt {
    flex: 1;
    padding: 9px 4px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 700;
    text-align: center;
    border: 2px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    transition: all var(--transition);
  }
  .priority-opt.sel-low    { border-color: var(--success); background: rgba(34,211,165,.12); color: var(--success); }
  .priority-opt.sel-medium { border-color: var(--warn);    background: rgba(245,158,11,.12);  color: var(--warn); }
  .priority-opt.sel-high   { border-color: var(--danger);  background: rgba(248,113,113,.12); color: var(--danger); }

  /* Color palette picker */
  .color-palette { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-swatch {
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: transform var(--transition), border-color var(--transition);
  }
  .color-swatch.selected { border-color: var(--text); transform: scale(1.15); }

  /* Subtasks */
  .subtask-list { margin-top: 8px; }
  .subtask-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .subtask-item input[type="text"] {
    flex: 1;
    background: transparent;
    border: none;
    padding: 0;
    font-size: 13px;
  }
  .add-subtask-btn {
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    padding: 6px 0;
    margin-top: 4px;
  }

  /* Submit */
  .submit-btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius);
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    margin-top: 6px;
    box-shadow: 0 6px 20px rgba(108,99,255,.35);
    transition: transform var(--transition), box-shadow var(--transition);
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(108,99,255,.5); }
  .submit-btn:active { transform: scale(.97); }

  /* ── NOTIFICATION SETTINGS (STEP 5) ────────────────────────────── */
  .notif-section {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-top: 6px;
  }
  .notif-section h4 {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 10px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .toggle-label { font-size: 13px; font-weight: 500; }
  .toggle {
    width: 44px; height: 24px;
    background: var(--border);
    border-radius: 24px;
    position: relative;
    cursor: pointer;
    transition: background var(--transition);
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    background: #fff;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform var(--transition);
    box-shadow: 0 2px 4px rgba(0,0,0,.25);
  }
  .toggle.on::after { transform: translateX(20px); }

  .interval-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .interval-chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text2);
    transition: all var(--transition);
  }
  .interval-chip.active {
    background: rgba(108,99,255,.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .notif-profile-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .notif-profile {
    flex: 1;
    min-width: 80px;
    padding: 8px 6px;
    text-align: center;
    border-radius: var(--radius-sm);
    font-size: 11px;
    font-weight: 700;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    transition: all var(--transition);
    cursor: pointer;
  }
  .notif-profile .icon { font-size: 18px; display: block; margin-bottom: 4px; }
  .notif-profile.active {
    border-color: var(--accent);
    background: rgba(108,99,255,.12);
    color: var(--accent);
  }

  .snooze-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
  }
  .snooze-row label { font-size: 13px; font-weight: 500; flex: 1; }
  .snooze-row input[type="number"] {
    width: 70px;
    padding: 6px 10px;
    font-size: 13px;
    text-align: center;
  }
  .snooze-row span { font-size: 12px; color: var(--text2); }

  /* Location reminder */
  .location-row {
    margin-top: 10px;
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    border: 1.5px solid var(--border);
  }
  .location-row input { background: var(--surface2); padding: 7px 10px; font-size: 13px; }

  /* ── SCHEDULED NOTIFICATIONS PANEL ─────────────────────────────── */
  .scheduled-notif {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 13px;
    margin-bottom: 8px;
    position: relative;
  }
  .notif-icon-circle {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(108,99,255,.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .notif-body { flex: 1; min-width: 0; }
  .notif-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .notif-time { font-size: 11px; color: var(--text2); }
  .notif-dismiss {
    font-size: 16px;
    color: var(--text3);
    padding: 0 4px;
  }

  /* ── CONFETTI CANVAS ───────────────────────────────────────────── */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
  }

  /* ── TOAST ─────────────────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    box-shadow: var(--shadow);
    opacity: 0;
    transition: all .35s cubic-bezier(.4,0,.2,1);
    pointer-events: none;
    z-index: 500;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── IN-APP NOTIFICATION BANNER ─────────────────────────────────── */
  #notif-banner {
    position: fixed;
    top: -80px;
    left: 0; right: 0;
    max-width: 430px;
    margin: 0 auto;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 600;
    transition: top .4s cubic-bezier(.4,0,.2,1);
    border-radius: 0 0 var(--radius) var(--radius);
    box-shadow: var(--shadow);
  }
  #notif-banner.show { top: 0; }
  #notif-banner .nb-icon { font-size: 22px; }
  #notif-banner .nb-body { flex: 1; }
  #notif-banner .nb-title { font-size: 13px; font-weight: 700; }
  #notif-banner .nb-msg { font-size: 11px; opacity: .85; margin-top: 1px; }
  #notif-banner .nb-close { font-size: 18px; opacity: .8; cursor: pointer; }
  #notif-banner .nb-snooze {
    font-size: 11px;
    font-weight: 700;
    background: rgba(255,255,255,.2);
    border-radius: 20px;
    padding: 3px 10px;
    cursor: pointer;
    border: 1.5px solid rgba(255,255,255,.4);
    color: #fff;
    margin-top: 4px;
    display: inline-block;
  }

  /* ── SETTINGS VIEW ─────────────────────────────────────────────── */
  .settings-group {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 12px;
  }
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-row .row-left { display: flex; align-items: center; gap: 10px; }
  .settings-row .row-icon { font-size: 18px; }
  .settings-row .row-lbl { font-weight: 500; }
  .settings-row .row-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .theme-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 12px 16px;
  }
  .theme-opt {
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: border-color var(--transition);
  }
  .theme-opt.active { border-color: var(--accent); }
  .theme-preview {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
  }

  /* ── CATEGORIES VIEW ───────────────────────────────────────────── */
  .cat-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 14px;
    margin-bottom: 10px;
  }
  .cat-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .cat-name { font-size: 14px; font-weight: 600; flex: 1; }
  .cat-count { font-size: 12px; color: var(--text2); }

  /* ── SWIPE DELETE HINT ─────────────────────────────────────────── */
  .swipe-hint {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 70px;
    background: var(--danger);
    border-radius: 0 var(--radius) var(--radius) 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #fff;
    transform: translateX(70px);
    transition: transform var(--transition);
  }

  /* ── RESPONSIVE ────────────────────────────────────────────────── */
  @media (min-width: 431px) {
    #app { box-shadow: 0 0 60px rgba(0,0,0,.5); }
    .fab { max-width: 430px; }
    #notif-banner { max-width: 430px; }
  }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div id="notif-banner">
  <div class="nb-icon">🔔</div>
  <div class="nb-body">
    <div class="nb-title" id="nb-title">Task Reminder</div>
    <div class="nb-msg" id="nb-msg">Don't forget your task!</div>
    <button class="nb-snooze" id="nb-snooze-btn">Snooze 5 min</button>
  </div>
  <button class="nb-close" onclick="closeBanner()">✕</button>
</div>
<div id="toast"></div>

<div id="app">
  <header>
    <div class="logo">Task<span>ly</span></div>
    <div class="header-actions">
      <button class="icon-btn" onclick="showView('settings')" title="Settings">⚙️</button>
      <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">🌙</button>
    </div>
  </header>

  <nav class="nav">
    <button class="nav-btn active" onclick="showView('tasks')"     id="nav-tasks">Tasks</button>
    <button class="nav-btn"        onclick="showView('dashboard')" id="nav-dashboard">Dashboard</button>
    <button class="nav-btn"        onclick="showView('notifs')"    id="nav-notifs">Reminders</button>
    <button class="nav-btn"        onclick="showView('settings')"  id="nav-settings">Settings</button>
  </nav>

  <main id="main-content"></main>
</div>

<!-- FAB -->
<button class="fab" onclick="openModal()" id="fab" title="Add task">＋</button>

<!-- MODAL: Add / Edit Task -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-title">New Task</h2>

    <div class="form-group">
      <label>Task Title *</label>
      <input type="text" id="f-title" placeholder="What needs to be done?" maxlength="120" />
    </div>

    <div class="form-group">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Add details, links, or context…"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Due Date</label>
        <input type="datetime-local" id="f-due" />
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="f-category">
          <option value="">None</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Priority</label>
      <div class="priority-row">
        <button class="priority-opt" id="p-low"    onclick="setPriority('low')">🟢 Low</button>
        <button class="priority-opt" id="p-medium" onclick="setPriority('medium')">🟡 Medium</button>
        <button class="priority-opt" id="p-high"   onclick="setPriority('high')">🔴 High</button>
      </div>
    </div>

    <div class="form-group">
      <label>Tag Color</label>
      <div class="color-palette" id="color-palette"></div>
    </div>

    <div class="form-group">
      <label>Custom Tag</label>
      <input type="text" id="f-tag" placeholder="e.g. Design, Bug Fix, Idea…" maxlength="24" />
    </div>

    <!-- SUB-TASKS -->
    <div class="form-group">
      <label>Sub-tasks</label>
      <div class="subtask-list" id="subtask-list"></div>
      <button class="add-subtask-btn" onclick="addSubtask()">+ Add sub-task</button>
    </div>

    <!-- STEP 5: NOTIFICATION SETTINGS ─────────────────────────── -->
    <div class="form-group">
      <label>🔔 Notification Settings</label>
      <div class="notif-section">

        <div class="toggle-row">
          <span class="toggle-label">Enable Reminders</span>
          <div class="toggle" id="t-reminders" onclick="toggleReminders()"></div>
        </div>

        <div id="notif-options" style="display:none">
          <!-- Reminder Intervals -->
          <div style="margin-bottom:12px">
            <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Remind Me Before</div>
            <div class="interval-chips" id="interval-chips">
              <button class="interval-chip" data-min="5"    onclick="toggleInterval(this)">5 min</button>
              <button class="interval-chip" data-min="10"   onclick="toggleInterval(this)">10 min</button>
              <button class="interval-chip" data-min="30"   onclick="toggleInterval(this)">30 min</button>
              <button class="interval-chip active" data-min="60"  onclick="toggleInterval(this)">1 hr</button>
              <button class="interval-chip" data-min="120"  onclick="toggleInterval(this)">2 hr</button>
              <button class="interval-chip" data-min="1440" onclick="toggleInterval(this)">1 day</button>
            </div>
            <input type="number" id="custom-interval" placeholder="Custom minutes…" min="1" max="10080"
              style="margin-top:8px;width:100%;padding:7px 10px;font-size:13px;border-radius:var(--radius-sm);background:var(--surface);border:1.5px solid var(--border);color:var(--text);" />
          </div>

          <!-- Notification Profiles -->
          <div style="margin-bottom:12px">
            <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Notification Profile</div>
            <div class="notif-profile-row">
              <button class="notif-profile" data-p="summary" onclick="setNotifProfile(this)">
                <span class="icon">📋</span>Daily Summary
              </button>
              <button class="notif-profile active" data-p="nudge" onclick="setNotifProfile(this)">
                <span class="icon">👋</span>Gentle Nudge
              </button>
              <button class="notif-profile" data-p="alarm" onclick="setNotifProfile(this)">
                <span class="icon">🚨</span>Persistent Alarm
              </button>
            </div>
          </div>

          <!-- Snooze Duration -->
          <div class="snooze-row">
            <label>Default Snooze</label>
            <input type="number" id="snooze-dur" value="5" min="1" max="120" />
            <span>minutes</span>
          </div>

          <!-- Repeat -->
          <div class="toggle-row" style="margin-top:12px">
            <span class="toggle-label">Repeat Notification</span>
            <div class="toggle" id="t-repeat" onclick="this.classList.toggle('on')"></div>
          </div>

          <!-- Location-based -->
          <div class="toggle-row">
            <span class="toggle-label">📍 Location-based Reminder</span>
            <div class="toggle" id="t-location" onclick="toggleLocation()"></div>
          </div>
          <div id="location-field" class="location-row" style="display:none">
            <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px">Location name or address</div>
            <input type="text" id="f-location" placeholder="e.g. Home, Office, Gym…" style="width:100%" />
            <div style="display:flex;gap:6px;margin-top:8px">
              <button class="interval-chip active" data-when="arrive" onclick="selectWhen(this)">On Arrive</button>
              <button class="interval-chip" data-when="leave"  onclick="selectWhen(this)">On Leave</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <button class="submit-btn" onclick="saveTask()" id="submit-btn">Add Task</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════════
   STEP 1 & 2 — STATE, DATA MODELS, PERSISTENCE
══════════════════════════════════════════════════════════════════ */
const COLORS = ['#6C63FF','#22D3A5','#F59E0B','#F87171','#60A5FA','#F472B6','#A78BFA','#34D399','#FB923C','#818CF8'];
const PRIORITY_COLOR = { low: '#22D3A5', medium: '#F59E0B', high: '#F87171' };

let state = {
  tasks: [],
  categories: [
    { id: 'c1', name: 'Work',     color: '#6C63FF' },
    { id: 'c2', name: 'Personal', color: '#22D3A5' },
    { id: 'c3', name: 'Health',   color: '#F59E0B' },
    { id: 'c4', name: 'Learning', color: '#F472B6' },
  ],
  settings: {
    theme: 'dark',
    defaultSnooze: 5,
    animationsEnabled: true,
    notifSounds: true,
  },
  scheduledNotifs: [],     // { id, taskId, taskTitle, fireAt, profile, snoozed }
  currentView: 'tasks',
  currentFilter: 'all',
  editingTaskId: null,
  charts: {},
};

// ── Form ephemeral state
let fPriority = 'medium';
let fColor = COLORS[0];
let fIntervals = [60];
let fNotifProfile = 'nudge';
let fLocationWhen = 'arrive';
let fSubtasks = [];
let fRemindersOn = false;

function save() {
  try {
    localStorage.setItem('taskly_v2', JSON.stringify({
      tasks: state.tasks,
      categories: state.categories,
      settings: state.settings,
      scheduledNotifs: state.scheduledNotifs,
    }));
  } catch(e) {}
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('taskly_v2') || 'null');
    if (d) {
      state.tasks = d.tasks || [];
      state.categories = d.categories || state.categories;
      state.settings = { ...state.settings, ...(d.settings || {}) };
      state.scheduledNotifs = d.scheduledNotifs || [];
    }
  } catch(e) {}
}

/* ══════════════════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════════════════ */
function showView(view) {
  state.currentView = view;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + view);
  if (nb) nb.classList.add('active');
  document.getElementById('fab').style.display = view === 'tasks' ? 'flex' : 'none';
  render();
}

/* ══════════════════════════════════════════════════════════════════
   STEP 3 — DASHBOARD VIEW
══════════════════════════════════════════════════════════════════ */
function renderDashboard() {
  const tasks = state.tasks;
  const done  = tasks.filter(t => t.completed);
  const total = tasks.length;
  const pct   = total ? Math.round(done.length / total * 100) : 0;

  // weekly data (last 7 days)
  const weekLabels = [];
  const weekDone   = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    weekLabels.push(d.toLocaleDateString('en',{weekday:'short'}));
    const ds = d.toDateString();
    weekDone.push(tasks.filter(t => t.completed && t.completedAt && new Date(t.completedAt).toDateString() === ds).length);
  }

  // category breakdown
  const catMap = {};
  tasks.forEach(t => {
    if (t.category) {
      catMap[t.category] = (catMap[t.category] || 0) + 1;
    }
  });
  const catNames  = Object.keys(catMap);
  const catCounts = catNames.map(k => catMap[k]);
  const catColors = catNames.map(k => {
    const cat = state.categories.find(c => c.id === k);
    return cat ? cat.color : '#6C63FF';
  });

  // streak
  let streak = 0;
  for (let i = 0; i < 30; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = d.toDateString();
    const had = tasks.some(t => t.completed && t.completedAt && new Date(t.completedAt).toDateString() === ds);
    if (!had && i > 0) break;
    if (had) streak++;
  }

  const overdue = tasks.filter(t => !t.completed && t.due && new Date(t.due) < new Date()).length;

  return `
    <div class="summary-row">
      <div class="summary-card"><div class="num c-accent">${total}</div><div class="lbl">Total</div></div>
      <div class="summary-card"><div class="num c-success">${done.length}</div><div class="lbl">Done</div></div>
      <div class="summary-card"><div class="num c-warn">${overdue}</div><div class="lbl">Overdue</div></div>
    </div>

    <div class="progress-bar-wrap">
      <div class="label-row">
        <span>Overall Progress</span>
        <span style="color:var(--accent);font-weight:800">${pct}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="insight-grid">
      <div class="insight-card">
        <div class="insight-icon">🔥</div>
        <div class="insight-text">
          <div class="val" style="color:var(--warn)">${streak}</div>
          <div class="desc">Day streak</div>
        </div>
      </div>
      <div class="insight-card">
        <div class="insight-icon">⚡</div>
        <div class="insight-text">
          <div class="val" style="color:var(--accent)">${tasks.filter(t=>t.priority==='high'&&!t.completed).length}</div>
          <div class="desc">High priority pending</div>
        </div>
      </div>
    </div>

    <div class="chart-card">
      <h3>📅 Completions – Last 7 Days</h3>
      <div class="chart-container"><canvas id="chart-weekly"></canvas></div>
    </div>

    ${catNames.length > 0 ? `
    <div class="chart-card">
      <h3>🗂 Category Breakdown</h3>
      <div class="chart-container"><canvas id="chart-cat"></canvas></div>
    </div>` : ''}

    <div class="chart-card">
      <h3>🎯 Priority Distribution</h3>
      <div class="chart-container"><canvas id="chart-priority"></canvas></div>
    </div>
  `;
}

function initCharts() {
  const isDark = !document.body.classList.contains('light');
  const gridColor = isDark ? 'rgba(255,255,255,.06)' : 'rgba(0,0,0,.06)';
  const textColor = isDark ? '#8B8FA8' : '#555870';
  Chart.defaults.color = textColor;

  const weekCanvas = document.getElementById('chart-weekly');
  if (weekCanvas) {
    const weekLabels = [];
    const weekDone   = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      weekLabels.push(d.toLocaleDateString('en',{weekday:'short'}));
      const ds = d.toDateString();
      weekDone.push(state.tasks.filter(t => t.completed && t.completedAt && new Date(t.completedAt).toDateString() === ds).length);
    }
    if (state.charts.weekly) state.charts.weekly.destroy();
    state.charts.weekly = new Chart(weekCanvas, {
      type: 'bar',
      data: {
        labels: weekLabels,
        datasets: [{
          label: 'Completed',
          data: weekDone,
          backgroundColor: 'rgba(108,99,255,.7)',
          borderRadius: 6,
          borderSkipped: false,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: gridColor }, ticks: { font: { size: 11 } } },
          y: { grid: { color: gridColor }, ticks: { stepSize: 1, font: { size: 11 } } }
        }
      }
    });
  }

  const catCanvas = document.getElementById('chart-cat');
  if (catCanvas) {
    const catMap = {};
    state.tasks.forEach(t => {
      if (t.category) catMap[t.category] = (catMap[t.category] || 0) + 1;
    });
    const catNames  = Object.keys(catMap);
    const catCounts = catNames.map(k => catMap[k]);
    const catLabels = catNames.map(k => {
      const cat = state.categories.find(c => c.id === k);
      return cat ? cat.name : k;
    });
    const catColors = catNames.map(k => {
      const cat = state.categories.find(c => c.id === k);
      return cat ? cat.color : '#6C63FF';
    });
    if (state.charts.cat) state.charts.cat.destroy();
    state.charts.cat = new Chart(catCanvas, {
      type: 'doughnut',
      data: {
        labels: catLabels,
        datasets: [{ data: catCounts, backgroundColor: catColors, borderWidth: 0, hoverOffset: 6 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { boxWidth: 12, padding: 12, font: { size: 11 } } }
        },
        cutout: '65%'
      }
    });
  }

  const prioCanvas = document.getElementById('chart-priority');
  if (prioCanvas) {
    const high   = state.tasks.filter(t => t.priority === 'high').length;
    const medium = state.tasks.filter(t => t.priority === 'medium').length;
    const low    = state.tasks.filter(t => t.priority === 'low').length;
    if (state.charts.priority) state.charts.priority.destroy();
    state.charts.priority = new Chart(prioCanvas, {
      type: 'pie',
      data: {
        labels: ['High','Medium','Low'],
        datasets: [{
          data: [high, medium, low],
          backgroundColor: ['#F87171','#F59E0B','#22D3A5'],
          borderWidth: 0, hoverOffset: 6
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { boxWidth: 12, padding: 12, font: { size: 11 } } }
        }
      }
    });
  }
}

/* ══════════════════════════════════════════════════════════════════
   STEP 4 — TASKS VIEW
══════════════════════════════════════════════════════════════════ */
function renderTasks() {
  const filter = state.currentFilter;
  let tasks = [...state.tasks];
  if (filter === 'active')   tasks = tasks.filter(t => !t.completed);
  if (filter === 'done')     tasks = tasks.filter(t =>  t.completed);
  if (filter === 'high')     tasks = tasks.filter(t => t.priority === 'high' && !t.completed);
  if (filter === 'today') {
    const today = new Date().toDateString();
    tasks = tasks.filter(t => t.due && new Date(t.due).toDateString() === today);
  }

  const pending = state.tasks.filter(t => !t.completed).length;

  let html = `
    <div class="section-head">
      <h2>My Tasks</h2>
      <span class="badge">${pending}</span>
    </div>
    <div class="filter-row">
      ${['all','active','done','high','today'].map(f => `
        <button class="filter-chip ${filter===f?'active':''}" onclick="setFilter('${f}')">${f.charAt(0).toUpperCase()+f.slice(1)}</button>
      `).join('')}
      ${state.categories.map(c => `
        <button class="filter-chip ${filter===c.id?'active':''}" onclick="setFilter('${c.id}')" style="${filter===c.id?`background:${c.color}20;border-color:${c.color};color:${c.color}`:''}">
          <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c.color};margin-right:4px;vertical-align:middle"></span>${c.name}
        </button>
      `).join('')}
    </div>
  `;

  if (state.categories.some(c => c.id === filter)) {
    tasks = state.tasks.filter(t => t.category === filter);
  }

  if (!tasks.length) {
    html += `<div class="empty-state"><div class="emoji">✨</div><p>No tasks here.<br>Tap + to add one!</p></div>`;
    return html;
  }

  // Sort: incomplete high-priority first, then by due date
  tasks.sort((a, b) => {
    if (a.completed !== b.completed) return a.completed ? 1 : -1;
    const pOrder = { high: 0, medium: 1, low: 2 };
    if (pOrder[a.priority] !== pOrder[b.priority]) return pOrder[a.priority] - pOrder[b.priority];
    if (a.due && b.due) return new Date(a.due) - new Date(b.due);
    return 0;
  });

  html += tasks.map(task => renderTaskCard(task)).join('');
  return html;
}

function renderTaskCard(task) {
  const cat = state.categories.find(c => c.id === task.category);
  const isOverdue = !task.completed && task.due && new Date(task.due) < new Date();
  const dueStr = task.due ? formatDue(task.due) : '';
  const prioColor = PRIORITY_COLOR[task.priority] || PRIORITY_COLOR.medium;

  const subDone  = task.subtasks ? task.subtasks.filter(s => s.done).length : 0;
  const subTotal = task.subtasks ? task.subtasks.length : 0;
  const subPct   = subTotal ? Math.round(subDone / subTotal * 100) : 0;

  return `
    <div class="task-card ${task.completed?'completed':''}" id="task-${task.id}" onclick="handleCardClick(event,'${task.id}')">
      <div class="task-priority-bar" style="background:${prioColor}"></div>
      <div class="task-top">
        <div class="check-wrap">
          <button class="check-btn ${task.completed?'done':''}" onclick="toggleTask(event,'${task.id}')" aria-label="Toggle complete">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="task-body">
          <div class="task-title ${task.completed?'struck':''}">${escHtml(task.title)}</div>
          ${task.notes ? `<div style="font-size:12px;color:var(--text2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(task.notes)}</div>` : ''}
          <div class="task-meta">
            ${cat ? `<span class="tag" style="color:${cat.color};border-color:${cat.color}20;background:${cat.color}15">${cat.name}</span>` : ''}
            ${task.tag ? `<span class="tag" style="color:${task.color||'var(--accent)'};border-color:${(task.color||'#6C63FF')}30;background:${(task.color||'#6C63FF')}15">${escHtml(task.tag)}</span>` : ''}
            <span class="tag" style="color:${prioColor};border-color:${prioColor}30;background:${prioColor}15">${task.priority}</span>
            ${dueStr ? `<span class="task-date ${isOverdue?'overdue':''}">📅 ${dueStr}</span>` : ''}
            ${task.notifications?.enabled ? `<span style="font-size:11px;color:var(--accent)">🔔</span>` : ''}
            ${task.notifications?.location ? `<span style="font-size:11px;color:var(--success)">📍</span>` : ''}
          </div>
        </div>
      </div>
      ${subTotal > 0 ? `
        <div class="subtask-progress">
          <div class="subtask-label">${subDone}/${subTotal} sub-tasks · ${subPct}%</div>
          <div class="subtask-bar"><div class="subtask-fill" style="width:${subPct}%"></div></div>
        </div>` : ''}
      <div class="task-actions" onclick="event.stopPropagation()">
        <button class="task-action-btn" onclick="editTask('${task.id}')">✏️ Edit</button>
        <button class="task-action-btn del" onclick="deleteTask('${task.id}')">🗑 Delete</button>
      </div>
    </div>
  `;
}

function setFilter(f) {
  state.currentFilter = f;
  render();
}

function formatDue(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = d - now;
  if (diff < 0) return 'Overdue';
  if (diff < 60*60*1000) return `${Math.round(diff/60000)}m`;
  if (diff < 24*60*60*1000) return `${Math.round(diff/3600000)}h`;
  return d.toLocaleDateString('en', { month:'short', day:'numeric' });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══════════════════════════════════════════════════════════════════
   STEP 5A — TASK COMPLETION ANIMATION (CONFETTI + CHECKMARK)
══════════════════════════════════════════════════════════════════ */
function toggleTask(event, id) {
  event.stopPropagation();
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;

  task.completed = !task.completed;
  task.completedAt = task.completed ? new Date().toISOString() : null;
  save();

  const card = document.getElementById('task-' + id);
  if (card) {
    if (task.completed) {
      // Morphing checkmark animation
      card.classList.add('completing');
      setTimeout(() => card.classList.remove('completing'), 550);

      // Confetti burst
      if (state.settings.animationsEnabled) {
        launchConfetti();
      }
      showToast('✅ Task completed! Keep it up!');
    }
  }
  render();
}

// Confetti engine
const confettiCanvas = document.getElementById('confetti-canvas');
const ctx2d = confettiCanvas.getContext('2d');
let particles = [];
let confettiAnimId = null;

function launchConfetti() {
  confettiCanvas.width  = window.innerWidth;
  confettiCanvas.height = window.innerHeight;

  const colors = ['#6C63FF','#22D3A5','#F59E0B','#F87171','#A78BFA','#60A5FA','#F472B6'];
  for (let i = 0; i < 90; i++) {
    particles.push({
      x:  Math.random() * confettiCanvas.width,
      y: -10 - Math.random() * 80,
      r:  3 + Math.random() * 5,
      d:  2 + Math.random() * 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      tilt:  Math.random() * 10 - 5,
      tiltAngle: 0,
      tiltAngleIncrement: 0.05 + Math.random() * 0.08,
      shape: Math.random() > 0.5 ? 'circle' : 'rect',
    });
  }

  if (confettiAnimId) cancelAnimationFrame(confettiAnimId);
  animateConfetti();

  setTimeout(() => {
    particles = [];
    ctx2d.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    if (confettiAnimId) cancelAnimationFrame(confettiAnimId);
  }, 2500);
}

function animateConfetti() {
  ctx2d.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  particles.forEach(p => {
    ctx2d.save();
    ctx2d.globalAlpha = 0.9;
    ctx2d.fillStyle = p.color;
    ctx2d.translate(p.x, p.y);
    ctx2d.rotate(p.tilt * Math.PI / 180);
    if (p.shape === 'circle') {
      ctx2d.beginPath();
      ctx2d.arc(0, 0, p.r, 0, Math.PI * 2);
      ctx2d.fill();
    } else {
      ctx2d.fillRect(-p.r, -p.r * 0.5, p.r * 2, p.r);
    }
    ctx2d.restore();

    p.y       += p.d;
    p.x       += Math.sin(p.tiltAngle) * 1.5;
    p.tiltAngle += p.tiltAngleIncrement;
    p.tilt    = Math.sin(p.tiltAngle) * 12;
  });

  particles = particles.filter(p => p.y < confettiCanvas.height + 20);
  if (particles.length) confettiAnimId = requestAnimationFrame(animateConfetti);
}

/* ══════════════════════════════════════════════════════════════════
   STEP 5B — NOTIFICATION SYSTEM
══════════════════════════════════════════════════════════════════ */

// Schedule notifications for a task
function scheduleNotifications(task) {
  if (!task.notifications?.enabled || !task.due) return;

  // Remove old scheduled notifs for this task
  state.scheduledNotifs = state.scheduledNotifs.filter(n => n.taskId !== task.id);

  const dueTime = new Date(task.due).getTime();
  const now     = Date.now();
  const intervals = task.notifications.intervals || [60];

  intervals.forEach(min => {
    const fireAt = dueTime - min * 60 * 1000;
    if (fireAt > now) {
      state.scheduledNotifs.push({
        id:        `n-${task.id}-${min}`,
        taskId:    task.id,
        taskTitle: task.title,
        fireAt,
        profile:   task.notifications.profile || 'nudge',
        snoozed:   false,
        label:     min >= 1440 ? `${min/1440}d before` : min >= 60 ? `${min/60}h before` : `${min}min before`,
      });
    }
  });

  save();
}

// Poll for due notifications (runs every 30s)
function pollNotifications() {
  const now = Date.now();
  state.scheduledNotifs.forEach(n => {
    if (!n.fired && n.fireAt <= now) {
      n.fired = true;
      save();
      triggerNotification(n);
    }
  });
}

function triggerNotification(n) {
  // In-app banner
  document.getElementById('nb-title').textContent = '🔔 ' + n.taskTitle;
  const profiles = {
    summary: 'Daily summary reminder',
    nudge:   'Friendly reminder – task coming up!',
    alarm:   '🚨 URGENT – Task deadline approaching!'
  };
  document.getElementById('nb-msg').textContent = profiles[n.profile] || profiles.nudge;
  document.getElementById('nb-snooze-btn').onclick = () => snoozeNotification(n);
  document.getElementById('nb-snooze-btn').textContent = `Snooze ${state.settings.defaultSnooze}min`;

  const banner = document.getElementById('notif-banner');
  banner.classList.add('show');

  // Persistent alarm auto-repeats
  if (n.profile === 'alarm') {
    setTimeout(() => { if (banner.classList.contains('show')) triggerNotification(n); }, 15000);
  } else {
    setTimeout(() => banner.classList.remove('show'), n.profile === 'summary' ? 5000 : 10000);
  }

  // Browser notification
  if ('Notification' in window && Notification.permission === 'granted') {
    try {
      new Notification('Taskly – ' + n.taskTitle, {
        body: profiles[n.profile],
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">✅</text></svg>',
        tag:  n.id,
      });
    } catch(e) {}
  }
}

function snoozeNotification(n) {
  const mins = state.settings.defaultSnooze || 5;
  const newFireAt = Date.now() + mins * 60 * 1000;
  const snoozed = {
    ...n,
    id:      n.id + '-s' + Date.now(),
    fireAt:  newFireAt,
    fired:   false,
    snoozed: true,
  };
  state.scheduledNotifs.push(snoozed);
  save();
  closeBanner();
  showToast(`⏰ Snoozed ${mins} min`);
}

function closeBanner() {
  document.getElementById('notif-banner').classList.remove('show');
}

function requestNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

/* ══════════════════════════════════════════════════════════════════
   REMINDERS VIEW
══════════════════════════════════════════════════════════════════ */
function renderNotifs() {
  const upcoming = state.scheduledNotifs
    .filter(n => !n.fired)
    .sort((a, b) => a.fireAt - b.fireAt)
    .slice(0, 20);

  const profileIcons = { summary: '📋', nudge: '👋', alarm: '🚨' };
  let html = `
    <div class="section-head">
      <h2>Scheduled Reminders</h2>
      <span class="badge">${upcoming.length}</span>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="task-action-btn" onclick="requestNotifPermission()" style="font-size:12px">
        🔔 Enable Browser Notifications
      </button>
    </div>
  `;

  if (!upcoming.length) {
    html += `<div class="empty-state"><div class="emoji">🔕</div><p>No upcoming reminders.<br>Add a task with a due date to get notified.</p></div>`;
    return html;
  }

  html += upcoming.map(n => {
    const fireDate = new Date(n.fireAt);
    const fireStr  = fireDate.toLocaleString('en', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    return `
      <div class="scheduled-notif">
        <div class="notif-icon-circle">${profileIcons[n.profile] || '🔔'}</div>
        <div class="notif-body">
          <div class="notif-title">${escHtml(n.taskTitle)}</div>
          <div class="notif-time">${fireStr} · ${n.label} · <span style="color:var(--accent);font-weight:600;text-transform:capitalize">${n.profile}</span>${n.snoozed?' · 😴 Snoozed':''}</div>
        </div>
        <button class="notif-dismiss" onclick="dismissNotif('${n.id}')" title="Dismiss">✕</button>
      </div>
    `;
  }).join('');

  return html;
}

function dismissNotif(id) {
  state.scheduledNotifs = state.scheduledNotifs.filter(n => n.id !== id);
  save();
  render();
}

function setTheme(t) {

function applyTheme() {
  const t = state.settings.theme;
  document.body.classList.toggle('light', t === 'light');
  document.getElementById('theme-btn').textContent = t === 'dark' ? '🌙' : '☀️';
  if (t === 'corporate') {
    document.documentElement.style.setProperty('--bg',      '#131E2E');
    document.documentElement.style.setProperty('--surface', '#1E2A3A');
    document.documentElement.style.setProperty('--surface2','#263446');
    document.documentElement.style.setProperty('--accent',  '#3B82F6');
    document.documentElement.style.setProperty('--accent2', '#60A5FA');
    document.body.classList.remove('light');
  } else {
    document.documentElement.style.removeProperty('--bg');
    document.documentElement.style.removeProperty('--surface');
    document.documentElement.style.removeProperty('--surface2');
    document.documentElement.style.removeProperty('--accent');
    document.documentElement.style.removeProperty('--accent2');
  }
}

function toggleTheme() {
  setTheme(state.settings.theme === 'dark' ? 'light' : 'dark');
}

function toggleSetting(key) {
  state.settings[key] = !state.settings[key];
  save();
  render();
}

function updateSnooze(v) {
  state.settings.defaultSnooze = Math.max(1, Math.min(120, parseInt(v) || 5));
  save();
}

function addCategory() {
  const inp = document.getElementById('new-cat-name');
  const name = inp?.value?.trim();
  if (!name) return;
  state.categories.push({
    id:    'c' + Date.now(),
    name,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
  });
  if (inp) inp.value = '';
  save();
  render();
}

function deleteCategory(id) {
  state.categories = state.categories.filter(c => c.id !== id);
  state.tasks.forEach(t => { if (t.category === id) t.category = ''; });
  save();
  render();
}

function clearCompleted() {
  state.tasks = state.tasks.filter(t => !t.completed);
  save();
  showToast('🗑 Cleared completed tasks');
  render();
}

/* ══════════════════════════════════════════════════════════════════
   MODAL — ADD / EDIT TASK (STEP 4 + STEP 5 NOTIF FORM)
══════════════════════════════════════════════════════════════════ */
function openModal(taskId) {
  state.editingTaskId = taskId || null;
  fPriority     = 'medium';
  fColor        = COLORS[0];
  fIntervals    = [60];
  fNotifProfile = 'nudge';
  fLocationWhen = 'arrive';
  fSubtasks     = [];
  fRemindersOn  = false;

  const modal = document.getElementById('modal');
  const titleEl = document.getElementById('modal-title');
  const submitEl = document.getElementById('submit-btn');

  // Reset form
  document.getElementById('f-title').value    = '';
  document.getElementById('f-notes').value    = '';
  document.getElementById('f-due').value      = '';
  document.getElementById('f-tag').value      = '';
  document.getElementById('f-location') && (document.getElementById('f-location').value = '');
  document.getElementById('snooze-dur').value = state.settings.defaultSnooze;

  if (taskId) {
    titleEl.textContent  = 'Edit Task';
    submitEl.textContent = 'Save Changes';
    const task = state.tasks.find(t => t.id === taskId);
    if (task) {
      document.getElementById('f-title').value = task.title;
      document.getElementById('f-notes').value = task.notes || '';
      if (task.due) document.getElementById('f-due').value = task.due.slice(0, 16);
      document.getElementById('f-tag').value = task.tag || '';
      fPriority  = task.priority || 'medium';
      fColor     = task.color    || COLORS[0];
      fSubtasks  = (task.subtasks || []).map(s => ({ ...s }));
      if (task.notifications?.enabled) {
        fRemindersOn  = true;
        fIntervals    = task.notifications.intervals    || [60];
        fNotifProfile = task.notifications.profile      || 'nudge';
        document.getElementById('snooze-dur').value = task.notifications.snooze || state.settings.defaultSnooze;
      }
    }
  } else {
    titleEl.textContent  = 'New Task';
    submitEl.textContent = 'Add Task';
  }

  // Populate category select
  const catSel = document.getElementById('f-category');
  catSel.innerHTML = '<option value="">None</option>' +
    state.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  if (taskId) {
    const task = state.tasks.find(t => t.id === taskId);
    if (task?.category) catSel.value = task.category;
  }

  buildColorPalette();
  updatePriorityUI();
  buildSubtaskUI();
  updateNotifToggle();
  syncIntervalChips();

  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 350);
}

function buildColorPalette() {
  const palette = document.getElementById('color-palette');
  palette.innerHTML = COLORS.map(c => `
    <div class="color-swatch ${fColor===c?'selected':''}"
      style="background:${c}"
      onclick="selectColor('${c}')"></div>
  `).join('');
}

function selectColor(c) {
  fColor = c;
  buildColorPalette();
}

function setPriority(p) {
  fPriority = p;
  updatePriorityUI();
}

function updatePriorityUI() {
  ['low','medium','high'].forEach(p => {
    const el = document.getElementById('p-' + p);
    if (!el) return;
    el.className = 'priority-opt ' + (fPriority === p ? 'sel-' + p : '');
  });
}

function addSubtask() {
  fSubtasks.push({ id: 's' + Date.now(), title: '', done: false });
  buildSubtaskUI();
}

function buildSubtaskUI() {
  const list = document.getElementById('subtask-list');
  list.innerHTML = fSubtasks.map((s, i) => `
    <div class="subtask-item">
      <input type="checkbox" ${s.done?'checked':''} onchange="fSubtasks[${i}].done=this.checked" style="flex-shrink:0;accent-color:var(--accent)" />
      <input type="text" value="${escHtml(s.title)}" placeholder="Sub-task…"
        oninput="fSubtasks[${i}].title=this.value" />
      <button onclick="removeSubtask(${i})" style="color:var(--danger);font-size:16px">✕</button>
    </div>
  `).join('');
}

function removeSubtask(i) {
  fSubtasks.splice(i, 1);
  buildSubtaskUI();
}

function toggleReminders() {
  fRemindersOn = !fRemindersOn;
  updateNotifToggle();
}

function updateNotifToggle() {
  const tog  = document.getElementById('t-reminders');
  const opts = document.getElementById('notif-options');
  if (tog) tog.classList.toggle('on', fRemindersOn);
  if (opts) opts.style.display = fRemindersOn ? 'block' : 'none';
}

function toggleInterval(btn) {
  const min = parseInt(btn.dataset.min);
  if (fIntervals.includes(min)) {
    fIntervals = fIntervals.filter(m => m !== min);
    btn.classList.remove('active');
  } else {
    fIntervals.push(min);
    btn.classList.add('active');
  }
}

function syncIntervalChips() {
  document.querySelectorAll('.interval-chip[data-min]').forEach(btn => {
    btn.classList.toggle('active', fIntervals.includes(parseInt(btn.dataset.min)));
  });
  const tog = document.getElementById('t-reminders');
  if (tog) tog.classList.toggle('on', fRemindersOn);
}

function setNotifProfile(btn) {
  fNotifProfile = btn.dataset.p;
  document.querySelectorAll('.notif-profile').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleLocation() {
  const tog   = document.getElementById('t-location');
  const field = document.getElementById('location-field');
  tog.classList.toggle('on');
  field.style.display = tog.classList.contains('on') ? 'block' : 'none';
}

function selectWhen(btn) {
  fLocationWhen = btn.dataset.when;
  document.querySelectorAll('[data-when]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  state.editingTaskId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function handleCardClick(e, id) {
  // Expand/collapse details
}

function editTask(id) {
  openModal(id);
}

function deleteTask(id) {
  const card = document.getElementById('task-' + id);
  if (card) {
    card.classList.add('deleting');
    setTimeout(() => {
      state.tasks = state.tasks.filter(t => t.id !== id);
      state.scheduledNotifs = state.scheduledNotifs.filter(n => n.taskId !== id);
      save();
      render();
    }, 350);
  }
}

function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { showToast('⚠️ Please enter a task title'); return; }

  const due = document.getElementById('f-due').value;
  const customInterval = parseInt(document.getElementById('custom-interval')?.value);
  let intervals = [...fIntervals];
  if (customInterval > 0) intervals.push(customInterval);
  if (!intervals.length) intervals = [60];

  const notifData = fRemindersOn ? {
    enabled:   true,
    intervals,
    profile:   fNotifProfile,
    snooze:    parseInt(document.getElementById('snooze-dur').value) || state.settings.defaultSnooze,
    repeat:    document.getElementById('t-repeat')?.classList.contains('on'),
    location:  document.getElementById('t-location')?.classList.contains('on')
               ? { name: document.getElementById('f-location')?.value || '', when: fLocationWhen }
               : null,
  } : { enabled: false };

  if (state.editingTaskId) {
    const task = state.tasks.find(t => t.id === state.editingTaskId);
    if (task) {
      task.title     = title;
      task.notes     = document.getElementById('f-notes').value.trim();
      task.due       = due || null;
      task.category  = document.getElementById('f-category').value;
      task.tag       = document.getElementById('f-tag').value.trim();
      task.priority  = fPriority;
      task.color     = fColor;
      task.subtasks  = fSubtasks.filter(s => s.title.trim());
      task.notifications = notifData;
      scheduleNotifications(task);
    }
    showToast('✏️ Task updated');
  } else {
    const task = {
      id:          't' + Date.now(),
      title,
      notes:       document.getElementById('f-notes').value.trim(),
      due:         due || null,
      category:    document.getElementById('f-category').value,
      tag:         document.getElementById('f-tag').value.trim(),
      priority:    fPriority,
      color:       fColor,
      subtasks:    fSubtasks.filter(s => s.title.trim()),
      completed:   false,
      completedAt: null,
      createdAt:   new Date().toISOString(),
      notifications: notifData,
    };
    state.tasks.unshift(task);
    scheduleNotifications(task);
    showToast('✅ Task added!');
  }

  save();
  closeModal();
  render();
}

/* ══════════════════════════════════════════════════════════════════
   RENDER ENGINE
══════════════════════════════════════════════════════════════════ */
function render() {
  const main = document.getElementById('main-content');

  // Destroy charts before re-rendering
  Object.values(state.charts).forEach(c => { try { c.destroy(); } catch(e) {} });
  state.charts = {};

  switch (state.currentView) {
    case 'tasks':     main.innerHTML = renderTasks();     break;
    case 'dashboard': main.innerHTML = renderDashboard(); setTimeout(initCharts, 50); break;
    case 'notifs':    main.innerHTML = renderNotifs();    break;
    case 'settings':  main.innerHTML = renderSettings();  break;
  }
}

/* ══════════════════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

/* ══════════════════════════════════════════════════════════════════
   SEED DATA
══════════════════════════════════════════════════════════════════ */
function seedData() {
  if (state.tasks.length) return;

  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
  const inHour   = new Date(); inHour.setHours(inHour.getHours() + 1);
  const overdue  = new Date(); overdue.setDate(overdue.getDate() - 1);

  state.tasks = [
    {
      id: 't1', title: 'Finish quarterly report', notes: 'Include Q3 metrics and projections for Q4.',
      due: tomorrow.toISOString(), category: 'c1', tag: 'Report', priority: 'high', color: '#6C63FF',
      subtasks: [
        { id: 's1', title: 'Gather data', done: true },
        { id: 's2', title: 'Write summary', done: false },
        { id: 's3', title: 'Review with manager', done: false },
      ],
      completed: false, completedAt: null, createdAt: new Date().toISOString(),
      notifications: { enabled: true, intervals: [60, 1440], profile: 'nudge', snooze: 5, repeat: false, location: null },
    },
    {
      id: 't2', title: 'Morning workout – 5K run', notes: '',
      due: inHour.toISOString(), category: 'c3', tag: 'Fitness', priority: 'medium', color: '#22D3A5',
      subtasks: [], completed: false, completedAt: null, createdAt: new Date().toISOString(),
      notifications: { enabled: true, intervals: [30], profile: 'alarm', snooze: 5, repeat: false, location: { name: 'Gym', when: 'arrive' } },
    },
    {
      id: 't3', title: 'Read: Atomic Habits – Ch. 7', notes: 'Take notes on habit stacking.',
      due: null, category: 'c4', tag: 'Reading', priority: 'low', color: '#F472B6',
      subtasks: [], completed: true, completedAt: new Date().toISOString(), createdAt: new Date().toISOString(),
      notifications: { enabled: false },
    },
    {
      id: 't4', title: 'Submit tax documents', notes: 'Upload to the portal before midnight!',
      due: overdue.toISOString(), category: 'c2', tag: 'Finance', priority: 'high', color: '#F87171',
      subtasks: [
        { id: 's4', title: 'Gather receipts', done: true },
        { id: 's5', title: 'Upload to portal', done: false },
      ],
      completed: false, completedAt: null, createdAt: new Date().toISOString(),
      notifications: { enabled: true, intervals: [10], profile: 'alarm', snooze: 3, repeat: true, location: null },
    },
  ];

  // Schedule notifs for seeded tasks
  state.tasks.forEach(t => scheduleNotifications(t));
  save();
}

/* ══════════════════════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════════════════════ */
load();
applyTheme();
seedData();
render();
requestNotifPermission();

// Poll notifications every 30 seconds
setInterval(pollNotifications, 30000);
pollNotifications(); // immediate check

// Resize confetti canvas
window.addEventListener('resize', () => {
  confettiCanvas.width  = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
});

// Keyboard shortcut: 'n' = new task
document.addEventListener('keydown', e => {
  if (e.key === 'n' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
    openModal();
  }
  if (e.key === 'Escape') closeModal();
});
</script>
